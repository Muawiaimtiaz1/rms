<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS System — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <style>
    html {
      font-size: 18px;
    }

    body {
      font-family: 'Inter', sans-serif;
    }

    .glass {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.05);
    }

    .dark .glass {
      background: #111827;
      border: 1px solid #1f2937;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }


    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #eff6ff inset !important;
      -webkit-text-fill-color: #1e3a5f !important;
    }

    .dark input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #1e293b inset !important;
      -webkit-text-fill-color: #e2e8f0 !important;
    }
  </style>
</head>

<body
  class="min-h-screen bg-gray-50 dark:bg-gray-950 dark:bg-gradient-to-br dark:from-gray-950 dark:via-blue-950 dark:to-gray-900 flex items-center justify-center p-4 transition-colors duration-300">

  <div class="fixed top-6 right-6">
    <button onclick="toggleTheme()"
      class="p-3 rounded-xl bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 text-gray-500 dark:text-gray-400 shadow-sm hover:text-blue-600 dark:hover:text-blue-400 transition-all hover:border-blue-200 dark:hover:border-blue-700">
      <svg id="theme-icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 3v1m0 16v1m9-9h-1M4 9h-1m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <svg id="theme-icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
    </button>
  </div>

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-700 mb-4 shadow-lg shadow-blue-900/30">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white tracking-tight">POS System</h1>
      <p class="text-gray-500 dark:text-blue-300 text-sm mt-1 font-medium">Point of Sale Management</p>
    </div>

    <div class="glass rounded-2xl p-8">
      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="space-y-4">
          <div>
            <label
              class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Username</label>
            <input id="login-username" type="text" placeholder="Your username" required autocomplete="username"
              class="w-full px-4 py-3 rounded-xl bg-white dark:bg-gray-900/60 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-300 dark:placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all shadow-sm" />
          </div>
          <div>
            <label
              class="block text-xs font-semibold text-gray-600 dark:text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
            <div class="relative">
              <input id="login-password" type="password" placeholder="Your password" required
                autocomplete="current-password"
                class="w-full px-4 py-3 rounded-xl bg-white dark:bg-gray-900/60 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-300 dark:placeholder-gray-600 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all pr-12 shadow-sm" />
              <button type="button" onclick="togglePw('login-password')"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </button>
            </div>
          </div>
          <div id="login-error"
            class="hidden text-rose-600 dark:text-rose-400 text-sm bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-800 rounded-lg px-3 py-2">
          </div>
          <button type="submit" id="login-btn"
            class="w-full py-3.5 px-4 rounded-xl bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold text-base transition-all shadow-md shadow-blue-600/25 hover:shadow-blue-600/40">
            Sign In
          </button>
        </div>
      </form>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">© 2024 POS System</p>
  </div>

  <script>
    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark');
      if (isDark) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    function togglePw(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      err.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('login-username').value,
            password: document.getElementById('login-password').value
          })
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error; err.classList.remove('hidden'); }
        else { window.location.href = '/dashboard'; }
      } catch {
        err.textContent = 'Network error. Please try again.';
        err.classList.remove('hidden');
      }
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  </script>
</body>

</html>
